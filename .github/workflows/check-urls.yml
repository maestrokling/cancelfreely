name: Check Cancel URLs

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install pyyaml requests

      - name: Check URLs from services.json
        run: |
          python3 - <<'PYEOF'
          import json, requests, sys

          with open('public/data/services.json') as f:
              services = json.load(f)

          # These domains block crawlers — treat as passing
          ALLOWLIST = {
              'wsj.com', 'washingtonpost.com', 'microsoft.com',
              'mcafee.com', 'spectrum.com', 'amazon.com',
          }

          broken = []
          for s in services:
              slug = s.get('slug', '')
              for field in ['url', 'cancel_url']:
                  url = s.get(field, '')
                  if not url or url == 'null':
                      continue
                  # Skip known bot-blocking domains
                  if any(d in url for d in ALLOWLIST):
                      continue
                  try:
                      r = requests.get(url, timeout=10, allow_redirects=True,
                                       headers={'User-Agent': 'Mozilla/5.0 (compatible; CancelFreelyBot/1.0)'})
                      if r.status_code not in (200, 301, 302, 403, 429):
                          broken.append(f"- **{slug}** ({field}): {url} — HTTP {r.status_code}")
                  except Exception as e:
                      broken.append(f"- **{slug}** ({field}): {url} — ERROR: {e}")

          if broken:
              report = "# URL Check Report\n\n" + "\n".join(broken)
              with open('url-report.md', 'w') as f:
                  f.write(report)
              print(f"{len(broken)} broken URLs found:")
              print("\n".join(broken))
          else:
              print("All URLs passed.")
              with open('url-report.md', 'w') as f:
                  f.write("All URLs passed.")
          PYEOF

      - name: Open issue if failures found
        run: |
          failures=$(grep -c "^- " url-report.md || true)
          if [ "$failures" -gt "0" ]; then
            gh issue create \
              --title "URL Check: $failures broken links found ($(date -u +%Y-%m-%d))" \
              --body "$(cat url-report.md)" \
              --label "maintenance"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
