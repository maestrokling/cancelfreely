notes: "Peloton has two subscription tiers: All-Access (for equipment owners, ~$44/mo) and App (for non-equipment users, ~$12.99/mo). Canceling is straightforward online. Equipment owners who cancel lose most class content but the bike/tread still functions for manual workouts. Peloton restructured its debt in 2025 to avoid bankruptcy — company is still operating as of early 2026."
