<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancel Any Subscription — CancelFreely Directory</title>
  <meta name="description" content="Browse 100+ subscription cancel guides. Filter by category, sort by difficulty. Step-by-step instructions, friction scores, dark patterns documented.">
  <link rel="canonical" href="https://cancelfreely.com/cancel/">
  <meta property="og:title" content="CancelFreely — Cancel Any Subscription">
  <meta property="og:description" content="Browse 100+ cancel guides, filtered by category and sorted by friction score.">
  <link rel="stylesheet" href="../style.css">
  <style>
    .dir-header { max-width: 860px; margin: 1.5rem auto 0; padding: 0 1rem; }
    .dir-header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; }
    .search-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-row input { flex: 1; padding: 0.65rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
    .cats { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .cat-btn { padding: 4px 12px; font-size: 0.78rem; font-weight: 600; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #444; transition: background 0.1s; }
    .cat-btn:hover { background: #f0fdf4; border-color: #16a34a; color: #16a34a; }
    .cat-btn.active { background: #16a34a; border-color: #16a34a; color: #fff; }
    .sort-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; font-size: 0.8rem; color: #888; }
    .sort-btn { padding: 3px 10px; font-size: 0.78rem; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; color: #555; }
    .sort-btn.active { background: #f0fdf4; border-color: #16a34a; color: #16a34a; font-weight: 600; }
    .svc-table { max-width: 860px; margin: 0 auto 3rem; padding: 0 1rem; }
    .svc-row { display: flex; align-items: center; padding: 0.6rem 0.75rem; border-radius: 6px; text-decoration: none; color: inherit; gap: 0.75rem; border-bottom: 1px solid #f0f0f0; }
    .svc-row:hover { background: #f9fdf9; }
    .svc-name { flex: 1; font-size: 0.9rem; font-weight: 600; color: #111; }
    .svc-cat  { font-size: 0.72rem; color: #aaa; width: 90px; text-align: right; display: none; }
    .svc-method { font-size: 0.78rem; color: #666; width: 130px; flex-shrink: 0; }
    .cfs-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; width: 80px; text-align: center; }
    .cfs-1,.cfs-2 { background:#dcfce7; color:#166534; }
    .cfs-3 { background:#fef9c3; color:#854d0e; }
    .cfs-4 { background:#ffedd5; color:#9a3412; }
    .cfs-5 { background:#fee2e2; color:#991b1b; }
    .arrow { font-size: 0.8rem; color: #ccc; flex-shrink: 0; }
    .no-results { text-align: center; padding: 3rem 1rem; color: #888; font-size: 0.9rem; }
    @media(min-width:600px) { .svc-cat { display: block; } }
    @media(max-width:500px) { .svc-method { display: none; } }
    .back-link { display: inline-block; margin: 1rem 1rem 0; font-size: 0.85rem; color: #16a34a; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit;text-decoration:none;">CancelFreely</a></h1>
    <p class="tagline">Cancel any subscription. Free instructions. No tracking. No upsells.</p>
  </header>
  <a class="back-link" href="/">← Home</a>
  <div class="dir-header">
    <h1>Cancel Any Subscription</h1>
    <div class="search-row">
      <input type="search" id="dir-search" placeholder="Search services..." autocomplete="off">
    </div>
    <div class="cats" id="cat-filters"></div>
    <div class="sort-row">
      Sort:
      <button class="sort-btn active" data-sort="alpha">A–Z</button>
      <button class="sort-btn" data-sort="friction-desc">Hardest first</button>
      <button class="sort-btn" data-sort="friction-asc">Easiest first</button>
    </div>
  </div>
  <div class="svc-table" id="svc-list"></div>

  <script>
    const DIFF_LABEL = ['', 'Simple', 'Easy', 'Moderate', 'Difficult', 'Hostile'];
    let allServices = [];
    let activeCategory = 'all';
    let activeSort = 'alpha';

    const CATEGORIES = [
      'streaming','fitness','saas','news','telecom','insurance','shopping',
      'dating','security','subscription-boxes','cloud-storage','gaming',
      'finance','membership','health','education'
    ];
    const CAT_LABELS = {
      'streaming':'Streaming','fitness':'Fitness','saas':'SaaS','news':'News',
      'telecom':'Telecom','insurance':'Insurance','shopping':'Shopping',
      'dating':'Dating','security':'Security','subscription-boxes':'Sub Boxes',
      'cloud-storage':'Cloud Storage','gaming':'Gaming','finance':'Finance',
      'membership':'Membership','health':'Health','education':'Education'
    };

    function renderFilters(services) {
      const found = [...new Set(services.map(s => s.category).filter(Boolean))].sort();
      const cats = document.getElementById('cat-filters');
      const all = document.createElement('button');
      all.className = 'cat-btn active';
      all.dataset.cat = 'all';
      all.textContent = 'All';
      cats.appendChild(all);
      found.forEach(c => {
        const b = document.createElement('button');
        b.className = 'cat-btn';
        b.dataset.cat = c;
        b.textContent = CAT_LABELS[c] || c.charAt(0).toUpperCase() + c.slice(1);
        cats.appendChild(b);
      });
      cats.addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        activeCategory = btn.dataset.cat;
        cats.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
        renderList();
      });
    }

    function sortServices(list) {
      const s = [...list];
      if (activeSort === 'alpha') return s.sort((a,b) => a.name.localeCompare(b.name));
      if (activeSort === 'friction-desc') return s.sort((a,b) => (b.cancel_difficulty||0)-(a.cancel_difficulty||0)||a.name.localeCompare(b.name));
      if (activeSort === 'friction-asc') return s.sort((a,b) => (a.cancel_difficulty||0)-(b.cancel_difficulty||0)||a.name.localeCompare(b.name));
      return s;
    }

    function renderList() {
      const q = document.getElementById('dir-search').value.toLowerCase().trim();
      let list = allServices;
      if (activeCategory !== 'all') list = list.filter(s => s.category === activeCategory);
      if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || (s.category||'').toLowerCase().includes(q));
      list = sortServices(list);
      const el = document.getElementById('svc-list');
      if (list.length === 0) {
        el.innerHTML = '<div class="no-results">No services found. <a href="/#request">Request one →</a></div>';
        return;
      }
      el.innerHTML = list.map(s => {
        const cfs = s.cancel_difficulty || 0;
        const lbl = DIFF_LABEL[cfs] || '';
        const cls = cfs >= 1 && cfs <= 5 ? `cfs-${cfs}` : '';
        const method = s.cancel_method || '';
        const cat = (s.category || '').charAt(0).toUpperCase() + (s.category||'').slice(1);
        return `<a class="svc-row" href="/cancel/${s.slug}/">
          <span class="svc-name">${s.name}</span>
          <span class="svc-method">${method}</span>
          <span class="cfs-badge ${cls}">${lbl}</span>
          <span class="arrow">›</span>
        </a>`;
      }).join('');
    }

    fetch('/data/services.json')
      .then(r => r.json())
      .then(data => {
        allServices = data;
        renderFilters(data);
        renderList();
      });

    document.addEventListener('input', e => {
      if (e.target.id === 'dir-search') renderList();
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeSort = btn.dataset.sort;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
        renderList();
      });
    });
  </script>

  <footer>
    <p style="margin-bottom:-4px;">CancelFreely is free and never tracks you.</p>
    <p><a href="/">Home</a> · <a href="/about/">About</a> · <a href="https://ko-fi.com/cancelfreely" target="_blank" rel="noopener">☕ Ko-fi</a></p>
  </footer>
</body>
</html>
