    url: "https://www.youtube.com"
    note: "Free versions of P90X-style workouts available from many creators"
  - name: "Nike Training Club"
    url: "https://www.nike.com/ntc-app"
    note: "Free guided workout app"
notes: "BODi (Beachbody) operates on annual plans that auto-renew. The main complaint pattern is surprise renewals and refusal to honor same-day cancellation requests. Cancel at least 30 days before your renewal date to be safe. The service was originally phone-only to cancel; online cancellation was added but may still route to phone for some accounts."
