  - step: 2
    instruction: "For corporate clubs: use the cancellation request page at goldsgym.com/cancellation-request/ and follow the link provided for your location."
    note: ""
  - step: 3
    instruction: "For franchise clubs: visit in person or send a written cancellation notice via certified mail to your club's address."
    note: "Include your full name, membership ID, address, phone number, and cancellation request. Use certified mail with return receipt."
  - step: 4
    instruction: "Provide required notice — typically 30 days. Early termination fees may apply if under contract."
    note: "Fees up to $75 reported. Month-to-month members generally cancel without fees."
