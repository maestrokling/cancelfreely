notes: "IMPORTANT: 23andMe filed for Chapter 11 bankruptcy in March 2025. The company's future and how it handles customer genetic data is uncertain. Consider downloading your raw DNA data before canceling or closing your account, as the company or its assets may be sold. Your genetic data is particularly sensitive — review 23andMe's privacy settings and consider requesting deletion of your data under GDPR or CCPA if applicable."
