name: Audible
slug: audible
url: https://www.audible.com
category: streaming
cancel_method: online
friction_score: 4
last_verified: 2026-01-30
steps:
  - step: 1
    instruction: "Go to audible.com and sign in."
    note: "Cancellation is NOT available through the Audible mobile app — desktop/web only."
  - step: 2
    instruction: "Click your profile name in the top right, then select 'Account details'."
    note: ""
  - step: 3
    instruction: "Under 'Membership details', click 'Cancel membership'."
    note: "If you don't see this option, check which region's site you're on. UK users must use audible.co.uk, US users must use audible.com. Being on the wrong regional site is a known trap."
  - step: 4
    instruction: "Navigate through Audible's retention flow — you will be offered credits, pauses, and discounted plans before the final cancel button appears."
    note: ""
  - step: 5
    instruction: "Select a cancellation reason and click 'Cancel membership' to confirm."
    note: "Any unused credits/coins may be lost. Keep in mind books already purchased remain in your library forever."
dark_patterns:
  - type: "mobile app exclusion"
    description: "Cancellation is not available through the Audible mobile app — users must use a desktop browser, creating friction for mobile-first users."
    source: "Reddit r/audible, multiple threads 2023-2026"
  - type: "regional redirect loop"
    description: "US users accessing audible.co.uk (or vice versa) get stuck in a loop where the cancel option never appears. This is a known dark pattern reported by users as recently as January 2026."
    source: "Reddit r/audible, January 2026"
  - type: "UX complexity"
    description: "A UX designer commenting in 2024 noted that cancellation appears 'literally impossible on mobile' and that dark patterns are used to obscure the path even for people who know what to look for."
    source: "Reddit r/audible, 2023 thread with 2024 update"
retention_tactics:
  - "Offers to pause membership for 1-3 months."
  - "Offers bonus credits to stay."
  - "Offers a reduced membership rate."
  - "Reminds you of your unused credits that will be lost."
direct_cancel_url: "https://www.audible.com/account-details"
free_alternatives:
  - name: "Libby"
    url: "https://libbyapp.com"
    note: "Free audiobooks and ebooks through your public library"
  - name: "Overdrive"
    url: "https://www.overdrive.com"
    note: "Free library-based audiobook lending"
  - name: "Spotify (free tier)"
    url: "https://www.spotify.com"
    note: "Growing audiobook catalog; free tier has limited audiobook hours"
notes: "Audible is one of the highest-friction streaming cancellations. Key gotchas: (1) mobile app can't cancel, (2) regional site mismatch causes endless loops, (3) multi-screen retention flow. Unused credits are lost on cancellation. Books already purchased remain in your library indefinitely even after cancellation. The FTC's Click-to-Cancel Rule (July 2025) may pressure Audible to simplify this flow."
